# Auto-deploy the arbox-scheduler daemon to Fly.io on every push to main.
#
# Prereqs (one-time):
#   1. Create app-scoped Fly deploy token:
#        fly tokens create deploy --app arbox-scheduler --expiry 8760h
#   2. Add it to this repo as a secret named FLY_API_TOKEN:
#        Settings -> Secrets and variables -> Actions -> New repository secret
#
# After that every `git push origin main` triggers a rebuild + deploy.
# PRs get a build-only run (`fly deploy --build-only`) so the Dockerfile
# + build args are validated without changing the running app.
# Manual runs are available via the Actions tab (workflow_dispatch).

name: Fly Deploy

on:
  push:
    branches: [main]
    # Skip deploys when only docs change — saves Fly build minutes.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

# One in-flight deploy per ref; newer pushes cancel older runs so we don't
# ship stale commits.
concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Compute a short SHA once, hand it to later steps via an env var.
      # Kept out of `run:` bodies so no risk of shell-interpreted input.
      - name: Compute version tag
        id: ver
        env:
          FULL_SHA: ${{ github.sha }}
        run: echo "short=${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"

      # Validate-only on PRs: build the image on Fly's remote builder using
      # the same Dockerfile + build args as the real deploy, but don't ship.
      # Replaces the old `--dry-run` flag which flyctl removed in 0.4.x.
      - name: Build only (PRs)
        if: github.event_name == 'pull_request'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VERSION: ${{ steps.ver.outputs.short }}
        run: |
          flyctl version
          flyctl deploy \
            --app arbox-scheduler \
            --remote-only \
            --build-only \
            --build-arg "VERSION=$VERSION"

      - name: Deploy (real on main)
        if: github.event_name != 'pull_request'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VERSION: ${{ steps.ver.outputs.short }}
        run: |
          flyctl version
          flyctl deploy \
            --app arbox-scheduler \
            --remote-only \
            --ha=false \
            --build-arg "VERSION=$VERSION" \
            --wait-timeout 300

      - name: Show app status
        if: github.event_name != 'pull_request'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl status --app arbox-scheduler
