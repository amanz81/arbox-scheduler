# Arbox auto-scheduler config.
# Times are 24h "HH:MM" in the configured timezone.
#
# Each day can be written two ways:
#   1. Shorthand (single option):
#        monday: { enabled: true, time: "08:30", category: "Hall B" }
#   2. Priority list (ordered; first is most preferred):
#        monday:
#          enabled: true
#          options:
#            - { time: "08:30", category: "Hall B" }
#            - { time: "08:30", category: "Hall A" }
#
# `category` is a case-insensitive substring match against Arbox's
# box_categories.name (e.g. "Crossfit Hall B", "CrossFit- Hall A").
# Global `category_filter` excludes always apply on top.

timezone: Asia/Jerusalem
default_time: "09:00"

# Optional. Case-insensitive substring used to pick the right gym when your
# Arbox account has more than one (e.g. "Ross Valley" or "Crossfit Ross Valley").
# Matched against box name and location name. If unset and you have multiple
# gyms, discovery picks the first one and you may end up with the wrong gym.
gym: "Rose Valley"

# Global filter: only classes whose category contains one of `include` AND
# none of `exclude` are considered "real candidates". Applied when an option
# doesn't set its own `category`, and also as a safety net when it does.
# You may use either a YAML list (below) or one comma-separated line, e.g.
#   include: Hall A, Hall B
# Substrings are matched against Arbox class titles (Latin or Hebrew).
category_filter:
  include:
    - "Hall A"
    - "Hall B"
  exclude:
    - "Open Box"       # gym free-time, never auto-book
    - "Open"           # skip Open Workout / Open Box (substring catch-all)
    # Do NOT list "Weightlifting" here if you book the Tue 09:00 WL slot:
    # that word appears in the class title and global excludes run *before*
    # per-option Hall A/B matching — the whole row becomes "(no match)".
    - "Kids"
    - "Teens"
    - "Mobility"

days:
  # Sunday: 48h booking window (opens Friday same time). Prefer Hall B, fall
  # back to Hall A if the B slot doesn't exist or fills up.
  sunday:
    enabled: true
    options:
      - { time: "08:00", category: "Hall B" }
      - { time: "08:00", category: "Hall A" }

  # Monday: rare 08:30 slot. Same hall priority.
  monday:
    enabled: true
    options:
      - { time: "08:30", category: "Hall B" }
      - { time: "08:30", category: "Hall A" }

  # Tuesday: 09:00 is the weightlifting slot (Hall B); Hall A WOD same time if you prefer.
  tuesday:
    enabled: true
    options:
      - { time: "09:00", category: "Weightlifting" }
      - { time: "09:00", category: "Hall A" }

  wednesday:
    enabled: false  # rest day

  # Thursday: same 08:30 as Monday.
  thursday:
    enabled: true
    options:
      - { time: "08:30", category: "Hall B" }
      - { time: "08:30", category: "Hall A" }

  # Friday: your preferred slot (11:00). Hall B also exists at 09:00 some
  # weeks at the gym; that is not what this row targets.
  friday:
    enabled: true
    options:
      - { time: "11:00", category: "Hall B" }
      - { time: "11:00", category: "Hall A" }

  saturday:
    enabled: false  # rest day
