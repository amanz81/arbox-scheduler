# Arbox auto-scheduler config.
# Times are 24h "HH:MM" in the configured timezone.
#
# One class per day — the daemon books exactly one class per weekday, no
# priority-list fallback. Use either shorthand:
#   monday: { enabled: true, time: "08:30", category: "Hall B" }
# …or the full form (same thing, one option):
#   monday:
#     enabled: true
#     options:
#       - { time: "08:30", category: "Hall B" }
#
# Legacy multi-option YAML still parses for backwards compatibility, but
# Validate() clamps to options[0] and prints a stderr warning naming the
# dropped entries. If you want "just this Sunday book Hall A instead,"
# use the one-time-override file (Telegram /setup → 📅 Just {date}).
#
# `category` is a case-insensitive substring match against Arbox's
# box_categories.name (e.g. "Crossfit Hall B", "CrossFit- Hall A").
# Global `category_filter` excludes always apply on top.

timezone: Asia/Jerusalem
default_time: "09:00"

# Required when your Arbox account belongs to more than one gym (otherwise
# discovery picks the first one returned by /api/v2/boxes/locations, which
# may not be yours). Case-insensitive substring matched against the box name
# and the location name. Examples:
#   gym: "CrossFit Downtown"
#   gym: "Tel Aviv"
#
# Can also be supplied via the ARBOX_GYM env var so the repo stays
# user-agnostic.
gym: ""

# Global filter: only classes whose category contains one of `include` AND
# none of `exclude` are considered "real candidates". Applied when an option
# doesn't set its own `category`, and also as a safety net when it does.
# You may use either a YAML list (below) or one comma-separated line, e.g.
#   include: Hall A, Hall B
# Substrings are matched against Arbox class titles (Latin or Hebrew).
category_filter:
  include:
    - "Hall A"
    - "Hall B"
  exclude:
    - "Open Box"       # gym free-time, never auto-book
    - "Open"           # skip Open Workout / Open Box (substring catch-all)
    # Do NOT list "Weightlifting" here if you book the Tue 09:00 WL slot:
    # that word appears in the class title and global excludes run *before*
    # per-option Hall A/B matching — the whole row becomes "(no match)".
    - "Kids"
    - "Teens"
    - "Mobility"

days:
  # Sunday: 48h booking window (opens Friday same time).
  sunday:
    enabled: true
    time: "08:00"
    category: "Hall B"

  # Monday: 08:30 slot.
  monday:
    enabled: true
    time: "08:30"
    category: "Hall B"

  # Tuesday: 09:00 weightlifting in Hall B.
  tuesday:
    enabled: true
    time: "09:00"
    category: "Weightlifting"

  wednesday:
    enabled: false  # rest day

  # Thursday: same 08:30 as Monday.
  thursday:
    enabled: true
    time: "08:30"
    category: "Hall B"

  # Friday: preferred slot (11:00).
  friday:
    enabled: true
    time: "11:00"
    category: "Hall B"

  saturday:
    enabled: false  # rest day
