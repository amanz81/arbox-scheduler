# fly.toml — Fly.io config for arbox-scheduler
#
# This app is primarily an outbound worker that calls the Arbox API on a
# schedule. The optional [http_service] block exposes the LLM-facing HTTP
# API (see docs/API.md). The API stays dark unless you set
# ARBOX_API_READ_TOKEN and/or ARBOX_API_ADMIN_TOKEN as Fly secrets — the
# Go server checks for those at boot and refuses to listen otherwise.
#
# App name, region, and org are filled in by `fly launch`. Edit `app` and
# `primary_region` after launch if you want.

app            = "arbox-scheduler"   # override via `fly launch` if taken
primary_region = "fra"               # frankfurt = lowest-latency free region to Israel

# --------------------------------------------------------------------------
# Build: use the Dockerfile in this repo.
# --------------------------------------------------------------------------
[build]
  dockerfile = "Dockerfile"

# --------------------------------------------------------------------------
# Non-secret environment. Secrets (ARBOX_EMAIL, ARBOX_PASSWORD) live in
# `fly secrets` and are never checked in.
# --------------------------------------------------------------------------
[env]
  TZ             = "Asia/Jerusalem"
  ARBOX_ENV_FILE = "/data/.env"

# --------------------------------------------------------------------------
# Persistent volume: token/refresh-token state survives restarts & redeploys.
# Create with:  fly volumes create arbox_data --region fra --size 1
# --------------------------------------------------------------------------
[mounts]
  source      = "arbox_data"
  destination = "/data"

# --------------------------------------------------------------------------
# Single small machine is plenty. Auto-stop OFF — we must stay awake to fire
# at booking windows. Auto-restart ON so crashes recover on their own.
# --------------------------------------------------------------------------
[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[processes]
  app = "daemon --interval=1m --lookahead=7"

[deploy]
  strategy = "immediate"

# --------------------------------------------------------------------------
# HTTP service for the LLM-facing API (see docs/API.md and docs/NANOBOT.md).
# Force-HTTPS at the edge; bearer auth at the app. Only starts if at least
# one of ARBOX_API_READ_TOKEN / ARBOX_API_ADMIN_TOKEN is set.
# --------------------------------------------------------------------------
[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/api/v1/healthz"
